  /**:
    ros__parameters:
      use_gps: false  # Set false on robots without a GPS receiver (skips /gps/filtered sub + stale warnings)
      db_path: "wifi_data.db"
      wifi_interface: ""  # Leave empty for auto-detection
      min_signal_level: -100.0
      max_signal_level: -10.0
      update_interval: 1.0
      decimals_to_round_coordinates: 3
      publish_metrics: true
      publish_overlay: true
      # ------------------------------------------------------------------
      # heat_mapper-specific parameters (ignored by wifi_logger)
      # ------------------------------------------------------------------
      # When true, the RViz color ramp is auto-fit to the observed min/max
      # signal in the current data set each publish cycle. When false, the
      # fixed min_signal_level / max_signal_level window above is used.
      normalize: true
      marker_alpha: 1.0          # Opacity of cube markers (0..1)
      text_size: 0.08            # Height of text markers in meters
      scale_factor: 1.0          # Standalone matplotlib scale factor
      costmap_topic: "/global_costmap/costmap"
      do_publish_markers: true
      do_publish_text_markers: true
      # RViz2 overlay parameters:
      ov_horizontal_alignment: 0  # LEFT:0 RIGHT:1 CENTER:2
      ov_vertical_alignment: 3    # CENTER:2 TOP:3 Bottom:4
      ov_horizontal_distance: 10
      ov_vertical_distance: 10
      ov_width_factor: 1.0
      ov_height_factor: 1.0
      ov_font: "DejaVu Sans Mono"
      ov_font_size: 12.0
      ov_font_color: "0.1 0.1 0.1 1.0"  # RGBA
      ov_bg_color: "1.0 1.0 1.0 0.5"   # RGBA
      ov_do_short: true
      ov_do_full: true
